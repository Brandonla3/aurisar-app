[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"

# Stale Vite-hashed chunks (file no longer exists after a deploy) must
# return a clean 404 instead of falling through to the SPA catch-all
# below — otherwise the browser receives index.html for a JS request
# and rejects the dynamic import with a MIME-type error. Default
# shadowing (no `force`) means real, existing assets still serve
# normally; this rule only fires when the file is gone.
[[redirects]]
  from = "/assets/*"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers — applied to every response.
# CSP allows: self for scripts/styles, Supabase REST + Realtime websockets,
# Resend (only used server-side, but kept open in case of future browser SDK),
# inline styles (React inline `style={}` props), data: URIs for icons / embedded JPEGs.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # 'unsafe-eval' is required by the spacetimedb v2 SDK — its row deserializer
    # uses `new Function(...)` to compile per-table decoder closures at
    # connection time. Without this directive the SDK throws EvalError during
    # DbConnection.builder().build() and every subscription silently fails.
    # wss://maincloud.spacetimedb.com is the live STDB endpoint (set via
    # VITE_SPACETIMEDB_URI; defaulted in src/features/world/useSpacetimeWorld.js).
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co wss://maincloud.spacetimedb.com https://api.resend.com https://api.pwnedpasswords.com https://challenges.cloudflare.com https://api.prod.whoop.com; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'"

# Cache the immutable Vite-hashed bundle aggressively.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
