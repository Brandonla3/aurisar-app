name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Vulnerability audit (fail on high+)
        run: npm audit --audit-level=high --omit=dev

      - name: World content mirror up to date
        run: npm run sync:content:check

      - name: Castle manifest up to date
        run: npm run emit:castle:check

      - name: World chest manifest up to date
        run: npm run emit:world-chests:check

      # Asset manifests fresh + every runtime GLB within its per-class budget
      # (config/asset-budgets.json), files present, ATTRIBUTION block current.
      # See docs/ART_DIRECTION.md and scripts/assets_pipeline.mjs.
      - name: Asset manifests + budgets
        run: npm run check:assets

      # Determinism gate: the worldgen GOLDEN snapshot (realized plateau
      # heights + site counts + a site-position digest) must match. Any PR
      # that reshuffles the seed-manifest draw order (docs/world-design-plan.md,
      # pillar "One reshuffle, then frozen ground") fails here instead of
      # silently moving every ruin/cave/chest in the live world.
      - name: Worldgen determinism (GOLDEN)
        run: npm run verify:worldgen

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload generated terrain assets
        uses: actions/upload-artifact@v7
        with:
          name: terrain-assets-${{ github.sha }}
          path: |
            public/assets/terrain/manifest.json
            public/assets/terrain/generated/
            assets-source/terrain/**/ARCHIVE.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
