name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Vulnerability audit (fail on high+)
        run: npm audit --audit-level=high --omit=dev

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
